<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="site.webmanifest">

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>MCoC | Portrayer</title>

<script type="module" crossorigin src="./assets/index.8198a119.js"></script>
<link rel="stylesheet" href="./assets/index.87520ace.css">

</head>

<body>

<div id="app"></div>

<script>

function injectAscension(){

const preview = document.querySelector("#preview");

if(!preview) return;

if(document.getElementById("ascensionIcon")) return;

const icon = document.createElement("img");
icon.id = "ascensionIcon";
icon.src = "assets/ascension.png";

const number = document.createElement("div");
number.id = "ascensionNumber";
number.innerText = "1";

preview.appendChild(icon);
preview.appendChild(number);

}

function hookCheckbox(){

const labels = Array.from(document.querySelectorAll("label"));

const target = labels.find(l =>
(l.textContent || "").toUpperCase().includes("ASCENSION")
);

if(!target) return;

const checkbox = target.querySelector("input");

if(!checkbox) return;

checkbox.addEventListener("change", () => {

const icon = document.getElementById("ascensionIcon");
const number = document.getElementById("ascensionNumber");

if(!icon) return;

if(checkbox.checked){

icon.style.display = "block";
number.style.display = "block";

}else{

icon.style.display = "none";
number.style.display = "none";

}

});

}

function init(){

injectAscension();
hookCheckbox();

}

setInterval(init,500);

</script>

</body>
</html>
